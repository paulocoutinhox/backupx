name: Mac App Store Deploy

# manual-only deploy to App Store Connect (TestFlight / App Store)
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Mac App Store
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: "corretto"
          java-version: "21"

      - name: Set up signing keychain
        env:
          MAS_APP_CERTIFICATE: ${{ secrets.MAS_APP_CERTIFICATE }}
          MAS_APP_CERTIFICATE_PWD: ${{ secrets.MAS_APP_CERTIFICATE_PWD }}
          MAS_INSTALLER_CERTIFICATE: ${{ secrets.MAS_INSTALLER_CERTIFICATE }}
          MAS_INSTALLER_CERTIFICATE_PWD: ${{ secrets.MAS_INSTALLER_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          KC="$RUNNER_TEMP/backupx.keychain-db"
          security create-keychain -p "$KEYCHAIN_PWD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KC"
          security default-keychain -s "$KC"
          security list-keychains -d user -s "$KC" "login.keychain-db"

          echo "$MAS_APP_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/app.p12"
          echo "$MAS_INSTALLER_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/installer.p12"
          security import "$RUNNER_TEMP/app.p12" -k "$KC" -P "$MAS_APP_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security import "$RUNNER_TEMP/installer.p12" -k "$KC" -P "$MAS_INSTALLER_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KC"
          rm -f "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/installer.p12"

      - name: Embed provisioning profile
        env:
          MAS_PROVISION_PROFILE: ${{ secrets.MAS_PROVISION_PROFILE }}
        run: echo "$MAS_PROVISION_PROFILE" | base64 --decode > composeApp/embedded.provisionprofile

      - name: Build App Store package
        env:
          MAS_APP_IDENTITY: ${{ secrets.MAS_APP_IDENTITY }}
        run: ./gradlew packageDistributionForCurrentOS -PmacAppStore=true

      - name: Locate package
        id: pkg
        run: echo "path=$(find composeApp/build/compose/binaries -name '*.pkg' | head -1)" >> "$GITHUB_OUTPUT"

      - name: Upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          mkdir -p "$HOME/.private_keys"
          echo "$ASC_API_KEY" | base64 --decode > "$HOME/.private_keys/AuthKey_${ASC_KEY_ID}.p8"
          xcrun altool --upload-app --type macos \
            --file "${{ steps.pkg.outputs.path }}" \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
          rm -f "$HOME/.private_keys/AuthKey_${ASC_KEY_ID}.p8"
